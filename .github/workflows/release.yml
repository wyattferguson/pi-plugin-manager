name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2.2.0

      - run: bun install --frozen-lockfile

      - name: Build & verify
        run: bun run build

      - name: Generate checksum
        run: sha256sum pi-plugin-manager-*.tgz > checksums.txt

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            pi-plugin-manager-*.tgz
            checksums.txt
          generate_release_notes: true
